apiVersion: 1

datasources:
  - name: PostgreSQL
    uid: postgres-ds
    type: postgres
    access: proxy
    url: postgres:5432
    database: $__env{POSTGRES_DB}
    user: $__env{POSTGRES_USER}
    secureJsonData:
      password: $__env{POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
      maxOpenConns: 20
      maxIdleConns: 5
      connMaxLifetime: 14400
      defaultEditor: code
      timeInterval: 1s
    isDefault: true
    editable: true
